<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loja de Bolos</title>

<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>

<body>

<header class="cabecalho">
  <h1>Nat bolos</h1>
  <p>Os melhores bolos da sua vida</p>
  <a href="#bolos" class="botao">ver bolos</a>
</header>

<section id="bolos" class="secao-bolos">
  <h2>Nossos bolos</h2>

  <div class="bolos-imagens">
    <div class="card-bolo"><img src="./imagens/bolo_chocolate.jpg" alt="bolo1" class="card-bolo-img" ><p class="card-bolo-nome" >Chocolate</p></div>
    <div class="card-bolo"><img src="https://placehold.co/300x300" alt="bolo2" class="card-bolo-img" ><p class="card-bolo-nome" >Morango</p></div>
    <div class="card-bolo"><img src="https://placehold.co/300x300" alt="bolo3" class="card-bolo-img" ><p class="card-bolo-nome" >Cenoura</p></div>
    <div class="card-bolo"><img src="https://placehold.co/300x300" alt="bolo4" class="card-bolo-img" ><p class="card-bolo-nome" >Limão</p></div>
    <div class="card-bolo"><img src="https://placehold.co/300x300" alt="bolo5" class="card-bolo-img" ><p class="card-bolo-nome" >Baunilha</p></div>
    <div class="card-bolo"><img src="https://placehold.co/300x300" alt="bolo6" class="card-bolo-img" ><p class="card-bolo-nome" >Red velvet</p></div>
    <div class="card-bolo"><img src="https://placehold.co/300x300" alt="bolo7" class="card-bolo-img" ><p class="card-bolo-nome" >Coco</p></div>
    <div class="card-bolo"><img src="https://placehold.co/300x300" alt="bolo8" class="card-bolo-img" ><p class="card-bolo-nome" >Maracujá</p></div>
    <div class="card-bolo"><img src="https://placehold.co/300x300" alt="bolo9" class="card-bolo-img" ><p class="card-bolo-nome" >Nutella</p></div>
  </div>
</section>

<section class="cozinheiros">
  <h2>Quem são os cozinheiros</h2>

  <div class="lista-cozinheiros">
    <div class="pessoa-img"><img src="https://placehold.co/200x250" alt="pessoa1"><p class="pessoa-nome" >Isaac</p></div>
    <div class="pessoa-img"><img src="https://placehold.co/200x250" alt="pessoa2"><p class="pessoa-nome" >Thalles</p></div>
    <div class="pessoa-img"><img src="https://placehold.co/200x250" alt="pessoa3"><p class="pessoa-nome">João</p></div>
    <div class="pessoa-img"><img src="https://placehold.co/200x250" alt="pessoa4"><p class="pessoa-nome">Murillo</p></div>
  </div>
</section>

<section class="secao-contato">
  <h2>Contato</h2>

  <form class="formulario">
    <input type="text" placeholder="Seu nome" required>
    <input type="email" placeholder="Seu email" required>
    <input type="tel" placeholder="Telefone" required>
    <textarea class="texto" placeholder="Mensagem" required></textarea>
    <a class="botao" href="#">Enviar</a>
  </form>

  <div class="botoes-contato">
    <a class="botao-redes" href="#">Instagram</a>
    <a class="botao-redes" href="#">iFood</a>
    <a class="botao-redes" href="#">Maps</a>
  </div>
</section>

<footer class="rodape">
  <p>Loja de Bolos - 2026</p>
</footer>

</body>
</html>
